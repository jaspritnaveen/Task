  <script>
    let num = 1;
    console.log(num);
    num = 15;
    console.log(num);
    num = 15;
    console.log(num);

    console.log(num2);

    const age = 10;
    console.log(age);

    // Data types

    // 1. Primitive data types

    // 1. String
    // 2. boolean
    // 3. undifined
    // 4. null
    // 5. number
    // 6. symbol
    // 7. bigint

    console.log(typeof age);

    // Date

    let d = new Date();

    console.log(d);

    // Nullish operator

    let name = null;

    var result = name ?? "Guest";

    console.log(result);

    // Destructring
    let fullname = "naveenkumar";

    let [char1, char2] = fullname;

    console.log(char1);
    console.log(char2);

    // Object
    let obj = { name1: "manoj", age1: 18, city: "tiruppur" };

    console.table(obj);

    let { name1, age1 } = obj;

    console.log(name1);
    console.log(age1);

    // Rest Operator
    let arr = [1, 2, 3, 4, 5, 6, 7, 8, 9];

    console.log(arr);

    let [, , ...remeing] = arr;

    console.log(remeing);

    // test
