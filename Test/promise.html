<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    let takkalbook = new Promise((resolve, reject) => {
      let bookingstatus = true;

      if (bookingstatus) {
        resolve();
      } else {
        reject();
      }
    });

    takkalbook.then(success).catch(failure);

    function success() {
      console.log("Booked");
    }

    function failure() {
      console.log("Failure");
    }
  </script>
</html>
