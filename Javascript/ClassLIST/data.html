<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #dateid {
        font-size: 84px;
        color: darkmagenta;
        font-family: cursive;
      }

      .date {
        height: 300px;
        width: 400px;
        background-color: rgba(100, 148, 237, 0.573);
        display: flex;
        justify-content: center;
        align-items: center;
        font-display: fallback;
        border-radius: 60px;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>

  <body>
    <div class="date">
      <h1 id="dateid"></h1>
    </div>
  </body>
  <script>
    var id = document.getElementById("dateid");

    function updateClock() {
      let d = new Date();
      let hour = String(d.getHours()).padStart(2, "0");
      let minutes = String(d.getMinutes()).padStart(2, "0");
      let seconds = String(d.getSeconds()).padStart(2, "0");

      id.textContent = `${hour}:${minutes}:${seconds}`;
    }

    setInterval(updateClock, 1000);
  </script>
</html>
