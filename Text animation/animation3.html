<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cabeçalho de Apresentação</title>
    <link rel="stylesheet" href="animation3.css" />
  </head>
  <body>
    <header></header>
    <section class="container">
      <div class="wrapper">
        <div class="intro">
          <span class="dynamic-text" id="dynamic-text"></span>
        </div>
      </div>
    </section>
  </body>

  <script>
    const words = [
      "Web Designer.",
      "Desenvolvedora.",
      "Freelancer.",
      "Consultora.",
    ];
    const dynamicText = document.getElementById("dynamic-text");

    let wordIndex = 0;
    let letterIndex = 0;
    let isDeleting = false;
    let typingSpeed = 120;
    let deletingSpeed = 60;
    let pauseBetweenWords = 1500;

    function type() {
      const currentWord = words[wordIndex];

      if (!isDeleting) {
        dynamicText.textContent = currentWord.slice(0, letterIndex + 1);
        letterIndex++;

        if (letterIndex === currentWord.length) {
          isDeleting = true;
          setTimeout(type, pauseBetweenWords);
          return;
        }
      } else {
        dynamicText.textContent = currentWord.slice(0, letterIndex - 1);
        letterIndex--;

        if (letterIndex === 0) {
          isDeleting = false;
          wordIndex = (wordIndex + 1) % words.length;
        }
      }
      setTimeout(type, isDeleting ? deletingSpeed : typingSpeed);
    }

    type();
  </script>
</html>
